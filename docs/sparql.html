  <!-- SPARQL Interface Section -->
  <div id="sparql-interface" class="box">
      <h2 class="title is-2">SPARQL Query Interface</h2>

      <!-- Example Questions Dropdown -->
      <div class="form">
        <div class="field">
          <label for="exampleSelect" class="label">Select a Question:</label>
          <div class="control">
            <div class="select">
              <select id="exampleSelect">
                <option value="">-- Choose an example --</option>
                <!-- Q1: entità antiquariali con sede negli Stati Uniti -->
                <option value="PREFIX agents: <https://w3id.org/zeri/ontology/zamo/agents#> PREFIX events: <https://w3id.org/zeri/ontology/zamo/events#> PREFIX sources: <https://w3id.org/zeri/ontology/zamo/sources#> PREFIX schema: <https://schema.org/> PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#> PREFIX dcterms: <http://purl.org/dc/terms/> PREFIX venture: <https://w3id.org/zeri/data/venture/> PREFIX org: <https://w3id.org/zeri/data/org/> PREFIX person: <https://w3id.org/zeri/data/person/> PREFIX seat: <https://w3id.org/zeri/data/seat/> PREFIX location: <https://w3id.org/zeri/data/location/> PREFIX event: <https://w3id.org/zeri/data/event/> PREFIX bib: <https://w3id.org/zeri/data/bib/> PREFIX client: <https://w3id.org/zeri/data/client/> SELECT DISTINCT ?venture ?org ?nome WHERE { ?venture agents:isCarriedOutBy ?org . ?org a agents:ArtDealerOrganization ; agents:hasSeat ?seat . ?seat agents:isLocatedIn ?loc . ?loc schema:address ?a . ?a schema:addressCountry ?paese . FILTER(CONTAINS(STR(?paese), 'Stati Uniti')) OPTIONAL { ?venture schema:name ?nome } } ORDER BY ?org">Q1 – Antiquari con sede negli Stati Uniti</option>
                <!-- Q2: indirizzo di Giuseppe Bellesi nel 1950 -->
                <option value="PREFIX agents: <https://w3id.org/zeri/ontology/zamo/agents#> PREFIX events: <https://w3id.org/zeri/ontology/zamo/events#> PREFIX sources: <https://w3id.org/zeri/ontology/zamo/sources#> PREFIX schema: <https://schema.org/> PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#> PREFIX dcterms: <http://purl.org/dc/terms/> PREFIX venture: <https://w3id.org/zeri/data/venture/> PREFIX org: <https://w3id.org/zeri/data/org/> PREFIX person: <https://w3id.org/zeri/data/person/> PREFIX seat: <https://w3id.org/zeri/data/seat/> PREFIX location: <https://w3id.org/zeri/data/location/> PREFIX event: <https://w3id.org/zeri/data/event/> PREFIX bib: <https://w3id.org/zeri/data/bib/> PREFIX client: <https://w3id.org/zeri/data/client/> SELECT ?indirizzo ?città ?da ?a WHERE { org:BE_II agents:hasSeat ?sede . ?sede agents:isLocatedIn ?loc ; agents:isActiveFrom ?da ; agents:isActiveTo ?a . ?loc schema:address ?addr . ?addr schema:streetAddress ?indirizzo ; schema:addressLocality ?città . FILTER(STR(?da) <= '1950' && STR(?a) >= '1950') } ORDER BY ?città">Q2 – Indirizzo di Giuseppe Bellesi nel 1950</option>
                <!-- Q3: collaborazioni di Accorsi -->
                <option value="PREFIX agents: <https://w3id.org/zeri/ontology/zamo/agents#> PREFIX events: <https://w3id.org/zeri/ontology/zamo/events#> PREFIX sources: <https://w3id.org/zeri/ontology/zamo/sources#> PREFIX schema: <https://schema.org/> PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#> PREFIX dcterms: <http://purl.org/dc/terms/> PREFIX venture: <https://w3id.org/zeri/data/venture/> PREFIX org: <https://w3id.org/zeri/data/org/> PREFIX person: <https://w3id.org/zeri/data/person/> PREFIX seat: <https://w3id.org/zeri/data/seat/> PREFIX location: <https://w3id.org/zeri/data/location/> PREFIX event: <https://w3id.org/zeri/data/event/> PREFIX bib: <https://w3id.org/zeri/data/bib/> PREFIX client: <https://w3id.org/zeri/data/client/> SELECT DISTINCT ?fam_antiquari ?nome WHERE { org:AC agents:isCollaboratorIn ?collab . ?org agents:isCollaboratorIn ?collab ; a agents:ArtDealerOrganization . ?fam_antiquari agents:isCarriedOutBy ?org . FILTER(?org != org:AC) OPTIONAL { ?fam_antiquari schema:name ?nome } }">Q3 – Collaborazioni di Accorsi</option>
                <!-- Q4: bibliografia su Brass -->
                <option value="PREFIX agents: <https://w3id.org/zeri/ontology/zamo/agents#> PREFIX events: <https://w3id.org/zeri/ontology/zamo/events#> PREFIX sources: <https://w3id.org/zeri/ontology/zamo/sources#> PREFIX schema: <https://schema.org/> PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#> PREFIX dcterms: <http://purl.org/dc/terms/> PREFIX venture: <https://w3id.org/zeri/data/venture/> PREFIX org: <https://w3id.org/zeri/data/org/> PREFIX person: <https://w3id.org/zeri/data/person/> PREFIX seat: <https://w3id.org/zeri/data/seat/> PREFIX location: <https://w3id.org/zeri/data/location/> PREFIX event: <https://w3id.org/zeri/data/event/> PREFIX bib: <https://w3id.org/zeri/data/bib/> PREFIX client: <https://w3id.org/zeri/data/client/> SELECT ?anno ?citation WHERE { ?activity a sources:AgentActivity ; sources:refersTo venture:BR_III ; sources:isReconstructedBy ?recon . ?bib sources:isSourceFor ?recon . OPTIONAL { ?bib dcterms:date ?anno } OPTIONAL { ?bib dcterms:bibliographicCitation ?citation } } ORDER BY ?anno">Q4 – Bibliografia su Brass</option>
                <!-- Q5: storici dell'arte consulenti di più antiquari -->
                <option value="PREFIX agents: <https://w3id.org/zeri/ontology/zamo/agents#> PREFIX events: <https://w3id.org/zeri/ontology/zamo/events#> PREFIX sources: <https://w3id.org/zeri/ontology/zamo/sources#> PREFIX schema: <https://schema.org/> PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#> PREFIX dcterms: <http://purl.org/dc/terms/> PREFIX venture: <https://w3id.org/zeri/data/venture/> PREFIX org: <https://w3id.org/zeri/data/org/> PREFIX person: <https://w3id.org/zeri/data/person/> PREFIX seat: <https://w3id.org/zeri/data/seat/> PREFIX location: <https://w3id.org/zeri/data/location/> PREFIX event: <https://w3id.org/zeri/data/event/> PREFIX bib: <https://w3id.org/zeri/data/bib/> PREFIX client: <https://w3id.org/zeri/data/client/> SELECT ?person ?nome ?cognome (COUNT(DISTINCT ?collab) AS ?n_antiquari) WHERE { ?person agents:providesServiceIn ?collab . ?collab agents:hasRole agents:art-historian-consultant . OPTIONAL { ?person schema:givenName ?nome } OPTIONAL { ?person schema:familyName ?cognome } } GROUP BY ?person ?nome ?cognome HAVING (COUNT(DISTINCT ?collab) > 1) ORDER BY DESC(?n_antiquari)">Q5 – Storici dell'arte consulenti di più antiquari</option>
                <!-- Q6: membri della famiglia Sestieri antiquari -->
                <option value="PREFIX agents: <https://w3id.org/zeri/ontology/zamo/agents#> PREFIX events: <https://w3id.org/zeri/ontology/zamo/events#> PREFIX sources: <https://w3id.org/zeri/ontology/zamo/sources#> PREFIX schema: <https://schema.org/> PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#> PREFIX dcterms: <http://purl.org/dc/terms/> PREFIX venture: <https://w3id.org/zeri/data/venture/> PREFIX org: <https://w3id.org/zeri/data/org/> PREFIX person: <https://w3id.org/zeri/data/person/> PREFIX seat: <https://w3id.org/zeri/data/seat/> PREFIX location: <https://w3id.org/zeri/data/location/> PREFIX event: <https://w3id.org/zeri/data/event/> PREFIX bib: <https://w3id.org/zeri/data/bib/> PREFIX client: <https://w3id.org/zeri/data/client/> SELECT DISTINCT ?person ?nome ?cognome WHERE { { venture:SE_II agents:isCarriedOutBy ?person . ?person a agents:Person. } OPTIONAL { ?person schema:givenName ?nome } OPTIONAL { ?person schema:familyName ?cognome } } ORDER BY ?nome">Q6 – Membri della famiglia Sestieri antiquari</option>
                <!-- Q7: eventi 1890-1900 -->
                <option value="PREFIX agents: <https://w3id.org/zeri/ontology/zamo/agents#> PREFIX events: <https://w3id.org/zeri/ontology/zamo/events#> PREFIX sources: <https://w3id.org/zeri/ontology/zamo/sources#> PREFIX schema: <https://schema.org/> PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#> PREFIX dcterms: <http://purl.org/dc/terms/> PREFIX venture: <https://w3id.org/zeri/data/venture/> PREFIX org: <https://w3id.org/zeri/data/org/> PREFIX person: <https://w3id.org/zeri/data/person/> PREFIX seat: <https://w3id.org/zeri/data/seat/> PREFIX location: <https://w3id.org/zeri/data/location/> PREFIX event: <https://w3id.org/zeri/data/event/> PREFIX bib: <https://w3id.org/zeri/data/bib/> PREFIX client: <https://w3id.org/zeri/data/client/> SELECT ?evento ?label ?anno WHERE { ?evento events:hasDate ?anno ; rdfs:label ?label . FILTER(STR(?anno) >= '1890' && STR(?anno) <= '1900') } ORDER BY ?anno">Q7 – Eventi importanti tra il 1890 e il 1900</option>
                <!-- Q8: antiquari con sede a Milano -->
                <option value="PREFIX agents: <https://w3id.org/zeri/ontology/zamo/agents#> PREFIX events: <https://w3id.org/zeri/ontology/zamo/events#> PREFIX sources: <https://w3id.org/zeri/ontology/zamo/sources#> PREFIX schema: <https://schema.org/> PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#> PREFIX dcterms: <http://purl.org/dc/terms/> PREFIX venture: <https://w3id.org/zeri/data/venture/> PREFIX org: <https://w3id.org/zeri/data/org/> PREFIX person: <https://w3id.org/zeri/data/person/> PREFIX seat: <https://w3id.org/zeri/data/seat/> PREFIX location: <https://w3id.org/zeri/data/location/> PREFIX event: <https://w3id.org/zeri/data/event/> PREFIX bib: <https://w3id.org/zeri/data/bib/> PREFIX client: <https://w3id.org/zeri/data/client/> SELECT DISTINCT ?nome WHERE { ?org a agents:ArtDealerOrganization ; agents:hasSeat ?sede . ?sede agents:isLocatedIn ?loc . ?loc schema:address ?a . ?a schema:addressLocality ?città . ?venture agents:isCarriedOutBy ?org . FILTER(CONTAINS(LCASE(STR(?città)), 'milano')) OPTIONAL { ?venture schema:name ?nome } } ORDER BY ?venture">Q8 – Antiquari con sede a Milano</option>
                <!-- Q9: clienti principali di Ferroni -->
                <option value="PREFIX agents: <https://w3id.org/zeri/ontology/zamo/agents#> PREFIX events: <https://w3id.org/zeri/ontology/zamo/events#> PREFIX sources: <https://w3id.org/zeri/ontology/zamo/sources#> PREFIX schema: <https://schema.org/> PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#> PREFIX dcterms: <http://purl.org/dc/terms/> PREFIX venture: <https://w3id.org/zeri/data/venture/> PREFIX org: <https://w3id.org/zeri/data/org/> PREFIX person: <https://w3id.org/zeri/data/person/> PREFIX seat: <https://w3id.org/zeri/data/seat/> PREFIX location: <https://w3id.org/zeri/data/location/> PREFIX event: <https://w3id.org/zeri/data/event/> PREFIX bib: <https://w3id.org/zeri/data/bib/> PREFIX client: <https://w3id.org/zeri/data/client/> SELECT DISTINCT ?client ?nome ?cognome WHERE { ?trans events:hasSurrender ?venditore ; events:hasReceiver ?client . FILTER(?venditore IN (person:FE_1, org:FE)) OPTIONAL { ?client schema:givenName ?nome } OPTIONAL { ?client schema:familyName ?cognome } } ORDER BY ?cognome">Q9 – Clienti principali di Ferroni</option>
                <!-- Q10: sedi romane dell'antiquario Apolloni -->
                <option value="PREFIX agents: <https://w3id.org/zeri/ontology/zamo/agents#> PREFIX events: <https://w3id.org/zeri/ontology/zamo/events#> PREFIX sources: <https://w3id.org/zeri/ontology/zamo/sources#> PREFIX schema: <https://schema.org/> PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#> PREFIX dcterms: <http://purl.org/dc/terms/> PREFIX venture: <https://w3id.org/zeri/data/venture/> PREFIX org: <https://w3id.org/zeri/data/org/> PREFIX person: <https://w3id.org/zeri/data/person/> PREFIX seat: <https://w3id.org/zeri/data/seat/> PREFIX location: <https://w3id.org/zeri/data/location/> PREFIX event: <https://w3id.org/zeri/data/event/> PREFIX bib: <https://w3id.org/zeri/data/bib/> PREFIX client: <https://w3id.org/zeri/data/client/> SELECT ?indirizzo ?città ?da ?a WHERE { org:AP agents:hasSeat ?sede . ?sede agents:isLocatedIn ?loc . OPTIONAL { ?sede agents:isActiveFrom ?da } OPTIONAL { ?sede agents:isActiveTo ?a } OPTIONAL { ?loc schema:address ?addr . ?addr schema:streetAddress ?indirizzo ; schema:addressLocality ?città } } ORDER BY ?da">Q10 – Sedi romane dell'antiquario Apolloni</option>
              </select>
            </div>
          </div>
        </div>

      <!-- Endpoint URL -->
      <div class="field">
        <label for="endpoint" class="label">Endpoint URL:</label>
        <div class="control">
          <input id="endpoint" type="text" class="input" value="http://localhost:3030/zamo-kg/sparql" />
        </div>
      </div>

      <!-- Query Textarea -->
      <div class="field">
        <label for="query" class="label">SPARQL Query:</label>
        <div class="control">
          <textarea id="query" class="textarea" value="SELECT ?s ?p ?o WHERE { ?s ?p ?o } LIMIT 10"></textarea>
        </div>
      </div>

      <!-- Run Button -->
      <div class="field">
        <p class="control">
          <button id="run" class="button">Run Query</button>
        </p>
      </div>
    </div>

    <div class="block">
      <h3 class="title is-3">Response</h3>
      <div id="results" style="overflow-x:auto;">
      </div>
    </div>

    <script>
      document.getElementById('exampleSelect').addEventListener('change', function() {
              if (this.value) document.getElementById('query').value = this.value;
            });

            document.getElementById('run').addEventListener('click', async () => {
              const ep = document.getElementById('endpoint').value;
              const q  = document.getElementById('query').value;
              const url = ep + '?query=' + encodeURIComponent(q);
              const headers = { 'Accept': 'application/sparql-results+json' };
              const resultsDiv = document.getElementById('results');
              try {
                const res = await fetch(url, { headers });
                if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
                const json = await res.json();
                const vars = json.head.vars;
                let html = '<table class="table"><thead><tr>';
                vars.forEach(v => { html += `<th>${v}</th>`; });
                html += '</tr></thead><tbody>';
                json.results.bindings.forEach(row => {
                  html += '<tr>';
                  vars.forEach(v => { html += `<td>${row[v]?.value || ''}</td>`; });
                  html += '</tr>';
                });
                html += '</tbody></table>';
                resultsDiv.innerHTML = html;
              } catch (err) {
                resultsDiv.innerHTML = `<div class="alert alert-danger">Error: ${err.message}</div>`;
              }
            });
    </script>
